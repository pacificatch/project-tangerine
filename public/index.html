<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tangerine</title>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #fff8f0;
      color: #4a2c0a;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .logo-icon {
      font-size: 4rem;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 3rem;
      color: #e07b20;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 1rem;
      color: #6b4c1e;
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .chinese-sample {
      font-family: 'Ma Shan Zheng', 'KaiTi', 'STKaiti', cursive;
      font-size: 3rem;
      color: #c45e10;
      margin-bottom: 0.5rem;
      letter-spacing: 0.5rem;
    }

    .chinese-label {
      font-size: 0.85rem;
      color: #8c6030;
      margin-bottom: 3rem;
    }

    .status {
      background-color: #4a7c3f;
      color: #fff;
      padding: 0.5rem 1.25rem;
      border-radius: 999px;
      font-size: 0.8rem;
      letter-spacing: 1px;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.75rem;
      color: #a07840;
    }
  </style>
</head>
<body>

  <div class="logo-icon">🍊</div>
  <h1>Tangerine</h1>
  <p class="tagline">Traditional Chinese character learning, one character at a time.</p>

  <div class="chinese-sample">你好，世界</div>
  <p class="chinese-label">nǐ hǎo, shìjiè — Hello, World</p>

  <div class="status">● Coming Soon</div>

  <footer>Milestone 0 — Static Landing Page</footer>

</body>
</html>
